version: 2
updates:
  # npm dependencies — minor/patch only.
  # Major bumps come with too much surface change pre-1.0 to auto-PR;
  # we'll handle them in focused PRs as needed.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      ink:
        patterns: ["ink", "ink-*"]
      hono:
        patterns: ["hono", "@hono/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      types:
        patterns: ["@types/*"]
      tsup-build:
        patterns: ["tsup", "tsx", "typescript"]

  # GitHub Actions workflows — allow major bumps (action versions are mostly
  # node runtime updates, low blast radius and easy to revert).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
