version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      ink:
        patterns: ["ink", "ink-*"]
      hono:
        patterns: ["hono", "@hono/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      types:
        patterns: ["@types/*"]
      tsup-build:
        patterns: ["tsup", "tsx", "typescript"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
